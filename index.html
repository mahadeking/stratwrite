<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StratWrite — AI Writing Assistant</title>
    <script>
      // Apply the theme before first paint (default dark) so nothing flashes/animates.
      try {
        var s = JSON.parse(localStorage.getItem('writeright.settings') || '{}')
        if (s.dark !== false) document.documentElement.classList.add('dark')
      } catch (e) {
        document.documentElement.classList.add('dark')
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
